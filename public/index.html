<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN WebRTC Mesh Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-900 text-white h-screen overflow-hidden flex flex-col font-sans">
    
    <header class="bg-gray-800 p-4 shadow-md flex justify-between items-center z-10">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></span>
            Secure LAN P2P Network
        </h1>
        <div id="telemetry" class="text-xs text-gray-400 font-mono hidden md:block">
            Ping: <span id="rtt-val">0</span>ms | Loss: <span id="loss-val">0</span>%
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        
        <section class="flex-1 p-4 relative flex flex-col">
            <div id="video-grid" class="grid gap-4 w-full h-full auto-rows-fr grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
                <div class="relative rounded-xl overflow-hidden shadow-lg bg-black border border-gray-700">
                    <video id="local-video" class="w-full h-full object-cover transform -scale-x-100" autoplay muted playsinline></video>
                    <div class="absolute bottom-2 left-2 bg-black bg-opacity-60 px-2 py-1 rounded text-xs">You</div>
                </div>
            </div>

            <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 flex gap-4 p-3 bg-gray-800 bg-opacity-90 rounded-2xl backdrop-blur-md shadow-2xl border border-gray-700">
                <button id="toggle-video" class="p-3 bg-gray-700 hover:bg-gray-600 rounded-xl transition-colors">
                    🎥 Video
                </button>
                <button id="toggle-audio" class="p-3 bg-gray-700 hover:bg-gray-600 rounded-xl transition-colors">
                    🎤 Audio
                </button>
                <button id="share-screen" class="p-3 bg-blue-600 hover:bg-blue-500 rounded-xl transition-colors font-medium">
                    💻 Share Screen
                </button>
            </div>
        </section>

        <aside class="w-80 bg-gray-800 border-l border-gray-700 flex flex-col">
            <div class="p-4 border-b border-gray-700 font-semibold">Data Channel</div>
            
            <div id="chat-messages" class="flex-1 p-4 overflow-y-auto flex flex-col gap-2 text-sm"></div>
            
            <div class="p-4 border-t border-gray-700 bg-gray-850">
                <input type="file" id="file-input" class="hidden" />
                <label for="file-input" class="cursor-pointer block w-full text-center p-2 mb-2 border border-dashed border-gray-500 rounded hover:bg-gray-700 transition-colors text-xs text-gray-300">
                    📎 Select File to Send
                </label>
                <div id="transfer-progress" class="text-xs text-green-400 text-center hidden">Transferring...</div>
                
                <div class="flex gap-2 mt-2">
                    <input type="text" id="chat-input" class="flex-1 bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500" placeholder="Type a message...">
                    <button id="send-msg" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-sm font-medium transition-colors">Send</button>
                </div>
            </div>
        </aside>
    </main>

    <script src="app.js"></script>
</body>
</html>
